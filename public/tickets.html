<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LiveSupport - Tickets</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2 class="logo">LiveSupport</h2>
    <nav class="menu">
        <a href="dashboard.html">Inbox</a>
        <a href="tickets.html" class="active">Tickets</a>
        <a href="analytics.html">Analytics</a>
        <a href="kb.html">Knowledge Base</a>
        <a href="settings.html">Settings</a>
    </nav>
  </aside>

  <!-- MAIN AREA -->
  <div class="main">
    <header class="topbar">
      <div class="branch">
          Branch: <strong>Ikeja Branch</strong>
      </div>
      <div class="top-right">
          <span>Staff: <span id="staffName">Loading...</span></span>
          <a href="/logout"><button class="logout-btn">Logout</button></a>
      </div>
    </header>

    <!-- CONTENT -->
    <section class="content">

      <div class="tickets-header">
        <h1>Tickets</h1>
        <button id="createTicketBtn" class="action-btn">Create Ticket</button>
      </div>

      <p id="emptyState">No tickets yet.</p>

      <div id="ticketList" class="tickets-list"></div>

    </section>
  </div>

</div>

<!-- TICKET MODAL -->
<div id="ticketModal" class="modal">
  <div class="modal-content">
    <span class="close-btn">&times;</span>
    <h2>Restaurant Payment Ticket</h2>

    <textarea id="ticketText" spellcheck="false">
Restaurant Name
123 Main St, Lagos, Nigeria
+1 (555) 176-2972 | livesupportdashboard@gmail.com
__________________________________________
Ticket #: 10045   Date: 00/00/0000
Table: 00   Time: 00:00
Server: [Server Name]
__________________________________________
Items | Qty | Price | Total
__________________________________________
???????? | 0 | ₦0 | ₦0
???????? | 0 | ₦0 | ₦0
???????? | 0 | ₦0 | ₦0
__________________________________________
Subtotal: | | | ₦
VAT (7.5%): | | | ₦
Service Charge (5%): | | | ₦
__________________________________________
Total Amount: | | | ₦
__________________________________________
Thank you for dining with us!
Please visit again.
    </textarea>

    <div class="modal-actions">
      <button id="saveTicket" class="ai-btn primary">Save</button>
      <button id="printTicket" class="ai-btn success">Print</button>
    </div>
  </div>
</div>

<script>
const modal = document.getElementById("ticketModal");
const openBtn = document.getElementById("createTicketBtn");
const closeBtn = document.querySelector(".close-btn");
const saveBtn = document.getElementById("saveTicket");
const printBtn = document.getElementById("printTicket");
const ticketList = document.getElementById("ticketList");
const emptyState = document.getElementById("emptyState");

// Open modal
openBtn.onclick = () => modal.style.display = "block";

// Close modal
closeBtn.onclick = () => modal.style.display = "none";

// Close modal on outside click
window.onclick = (e) => {
  if (e.target === modal) modal.style.display = "none";
};

// Save ticket
saveBtn.onclick = async () => {
  const content = document.getElementById("ticketText").value;

  await fetch("/api/tickets", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ content })
  });

  modal.style.display = "none";
  loadTickets();
};

// Load tickets from backend
async function loadTickets() {
  const res = await fetch("/api/tickets");
  const data = await res.json();

  ticketList.innerHTML = "";

  if (data.length === 0) {
    emptyState.style.display = "block";
    return;
  }

  emptyState.style.display = "none";

  data.forEach(t => {
    const div = document.createElement("div");
    div.classList.add("ticketItem");

    div.innerHTML = `
      <h4>Ticket #${t.id} (${new Date(t.created_at).toLocaleString()})</h4>
      <pre>${t.content}</pre>
    `;

    ticketList.appendChild(div);
  });
}

// Print ticket
printBtn.onclick = () => {
  const ticketContent = document.getElementById("ticketText").value;
  const printWindow = window.open('', '', 'height=600,width=800');
  printWindow.document.write('<pre>' + ticketContent + '</pre>');
  printWindow.document.close();
  printWindow.print();
};

// Load staff name
fetch("/api/user")
  .then(res => res.json())
  .then(data => document.getElementById("staffName").textContent = data.role)
  .catch(err => console.log("User fetch error", err));

// Load tickets on page load
loadTickets();
</script>

</body>
</html>
