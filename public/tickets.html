        document.documentElement.classList.add('dark-theme');
      } else {
        document.documentElement.classList.remove('dark-theme');
      }

        color: #ff0000 !important;
        background: #ffffff !important;
      }

<!-- TICKET MODAL -->
<div id="ticketModal" class="modal">
  <div class="modal-content">
    <span class="close-btn">&times;</span>
    <h2>Restaurant Payment Ticket</h2>
    <textarea id="ticketText" spellcheck="false">
---------------------------------------------
Ticket ID: #1023
Submitted by: ......
Time: 14:32, 25 Mar 2026
Status: Open
Message: ".........."
---------------------------------------------
    </textarea>
    <div class="modal-actions">
      <button id="saveTicket" class="ai-btn primary">Save</button>
      <button id="printTicket" class="ai-btn success">Print</button>
    </div>
  </div>
</div>


<script>
const modal = document.getElementById("ticketModal");
const openBtn = document.getElementById("createTicketBtn");
const closeBtn = document.querySelector(".close-btn");
const saveBtn = document.getElementById("saveTicket");
const printBtn = document.getElementById("printTicket");
const ticketList = document.getElementById("ticketList");
const emptyState = document.getElementById("emptyState");
// Notification utilities
const ticketNotificationBar = document.getElementById("ticketNotificationBar");
const ticketNotificationText = document.getElementById("ticketNotificationText");
const ticketNotificationClose = document.getElementById("ticketNotificationClose");
function showTicketNotification(message) {
  if (!ticketNotificationBar || !ticketNotificationText) return;
  ticketNotificationText.textContent = message;
  ticketNotificationBar.style.display = "block";
  clearTimeout(showTicketNotification.timeout);
  showTicketNotification.timeout = setTimeout(() => {
    ticketNotificationBar.style.display = "none";
  }, 5000);
}
function hideTicketNotification() {
  if (!ticketNotificationBar) return;
  ticketNotificationBar.style.display = "none";
}
ticketNotificationClose.addEventListener("click", hideTicketNotification);
// Pending notification on load
const pendingTicketNotification = localStorage.getItem("ticketCreatedNotification");
if (pendingTicketNotification) {
  try {
    const ticketData = JSON.parse(pendingTicketNotification);
    showTicketNotification(`New ticket #${ticketData.id} created.`);
  } catch (e) {
    console.error("Invalid ticket notification in storage", e);
  }
  localStorage.removeItem("ticketCreatedNotification");
}
// Open modal
openBtn.onclick = () => modal.style.display = "block";
// Close modal
closeBtn.onclick = () => modal.style.display = "none";
// Close modal on outside click
window.onclick = (e) => {
  if (e.target === modal) modal.style.display = "none";
};
// Save ticket
saveBtn.onclick = async () => {
  const content = document.getElementById("ticketText").value;
  const res = await fetch("/api/tickets", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ content })
  });
  if (res.ok) {
    const created = await res.json();
    // Browser alert
    alert(`Ticket #${created.id} created successfully.`);
    // In-page notification
    showTicketNotification(`Ticket #${created.id} created successfully.`);
    // Browser notification if ticket alerts are enabled
    if (localStorage.getItem('ticketAlert') === 'true' && 'Notification' in window && Notification.permission === 'granted') {
      new Notification('LiveSupport - New Ticket', {
        body: `Ticket #${created.id} created.`,
        icon: '/favicon.ico'
      });
    }
    // Persist notification for dashboard page and so it can be shown there
    localStorage.setItem("ticketCreatedNotification", JSON.stringify({
      id: created.id,
      message: "New ticket created.",
      timestamp: new Date().toISOString()
    }));
    modal.style.display = "none";
    loadTickets();
  } else {
    alert("Failed to create ticket. Please try again.");
  }
};
// Load tickets from backend
async function loadTickets() {
  const res = await fetch("/api/tickets");
  const data = await res.json();
  ticketList.innerHTML = "";
  if (data.length === 0) {
    emptyState.style.display = "block";
    return;
  }
  emptyState.style.display = "none";
  data.forEach(t => {
  const div = document.createElement("div");
  div.classList.add("ticketItem");
  // Ticket content with print button
  div.innerHTML = `
    <div class="ticket-header" style="display: flex; justify-content: space-between; align-items: center;">
      <h4>Ticket #${t.id} (${new Date(t.created_at).toLocaleString()})</h4>
      <div>
        <button class="escalateBtn" style="background: red; color: white; border: none; padding: 5px 10px; margin-right: 5px;">Escalate</button>
        <button class="printTicketBtn" style="background: blue; color: white; border: none; padding: 5px 10px;">Print</button>
      </div>
    </div>
    <div class="escalated-label" style="display: ${t.escalated ? 'block' : 'none'}; color: red; font-weight: bold; text-align: center; margin-bottom: 10px; font-size: 18px;">ESCALATED</div>
    <pre>${t.content}</pre>
  `;
  // Add click event for escalate button
  div.querySelector(".escalateBtn").onclick = async () => {
    await fetch("/api/escalate-ticket", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ticket_id: t.id })
    });
    loadTickets(); // Reload to show the label
  };
  // Add click event for this ticket's print button
  div.querySelector(".printTicketBtn").onclick = () => {
    const printWindow = window.open('', '', 'height=600,width=800');
    printWindow.document.write('<pre>' + t.content + '</pre>');
    printWindow.document.close();
    printWindow.print();
  };
  ticketList.appendChild(div);
});
}
// Print ticket
printBtn.onclick = () => {
  const ticketContent = document.getElementById("ticketText").value;
  const printWindow = window.open('', '', 'height=600,width=800');
  printWindow.document.write('<pre class="print-black">' + ticketContent + '</pre>');
  printWindow.document.close();
  printWindow.print();
};
// Load staff name
fetch("/api/user")
  .then(res => res.json())
  .then(data => document.getElementById("staffName").textContent = data.role)
  .catch(err => console.log("User fetch error", err));
function applyTicketPageTheme() {
  const theme = localStorage.getItem('theme') || 'Light';
  if (theme === 'Dark') {
    document.documentElement.classList.add('dark-theme');
  } else {
    document.documentElement.classList.remove('dark-theme');
  }
}
window.addEventListener('storage', (e) => {
  if (e.key === 'theme') applyTicketPageTheme();
});
window.addEventListener('focus', applyTicketPageTheme);
// Load tickets on page load
loadTickets();
</script>
<script src="/socket.io/socket.io.js"></script>
<script src="./js/notification-sound.js"></script>
