<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveSupport - Settings</title>
  <link rel="stylesheet" href="./css/style.css">
  <script>
    // Apply theme from localStorage immediately to prevent flash
    (function applyThemeImmediately() {
      const theme = localStorage.getItem('theme') || 'Light';
      if (theme === 'Dark') {
        const style = document.createElement('style');
        style.id = 'dark-mode-theme';
        style.textContent = `
          body { background: #1e1e1e !important; color: #ffffff !important; }
          input, textarea, select { background: #2d2d2d !important; color: #ffffff !important; border-color: #444 !important; }
          button { background: #0066cc !important; color: #ffffff !important; }
          .main, .content, .topbar, .sidebar { background: #1e1e1e !important; color: #ffffff !important; }
          a { color: #66b3ff !important; }
          h1, h2, h3, h4, h5, h6 { color: #ffffff !important; }
          label, span { color: #ffffff !important; }
        `;
        document.head.appendChild(style);
      }
    })();
  </script>
  <style>
    .settings-container { display: flex; }
    .settings-sidebar { width: 220px; background: #2c3e50; color: white; padding: 20px; }
    .settings-sidebar button {
      display: block; width: 100%; margin: 10px 0; padding: 10px;
      background: none; border: none; color: white; text-align: left; cursor: pointer;
    }
    .settings-sidebar button:hover { background: #34495e; }

    .settings-content { flex: 1; padding: 20px; }
    .settings-section { display: none; }
    .settings-section.active { display: block; }

    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; }
    input, select { width: 100%; padding: 8px; }

    /* Toggle Switch Styles */
    .switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 34px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 26px;
      width: 26px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #2196F3;
    }

    input:checked + .slider:before {
      transform: translateX(26px);
    }

    .switch-label {
      margin-left: 10px;
      vertical-align: top;
      font-size: 16px;
    }
  </style>
</head>
<body>

<div class="dashboard">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2 class="logo">LiveSupport</h2>
    <nav class="menu">
      <a href="dashboard.html" class="active">Inbox</a>
      <a href="./tickets.html">Tickets</a>
      <a href="analytics.html">Analytics</a>
      <a href="knowledge.html">Knowledge Base</a>
      <a href="settings.html">Settings</a>
    </nav>
  </aside>

  <!-- MAIN AREA -->
  <div class="main">
    <header class="topbar">
      <div class="branch">Branch: <strong>Ikeja Branch</strong></div>
      <div class="top-right">
        <span>Staff: <span id="staffName">Loading...</span></span>
        <a href="/logout"><button class="logout-btn">Logout</button></a>
      </div>
    </header>

    <div class="settings-container">
      <div class="settings-sidebar">
        <h3>Settings</h3>
        <button onclick="showSection('account')">Account</button>
        <button onclick="showSection('notifications')">Notifications</button>
        <button onclick="showSection('chat')">Chat Settings</button>
        <button onclick="showSection('tickets')">Ticket Settings</button>
        <button onclick="showSection('appearance')">Appearance</button>
      </div>

      <div class="settings-content">
        <!-- SUCCESS MESSAGE -->
        <div id="successMsg" style="display:none; color: green; margin-bottom: 10px;">
          Settings saved successfully!
        </div>

        <!-- ACCOUNT -->
        <div id="account" class="settings-section active">
          <h2>Account Settings</h2>
          <input type="text" id="displayName" placeholder="Display Name">
          <input type="email" id="email" placeholder="Email">
          <input type="password" id="password" placeholder="New Password">
          <button onclick="saveSettings()">Save Changes</button>
        </div>

        <!-- NOTIFICATIONS -->
        <div id="notifications" class="settings-section">
          <h2>Notification Settings</h2>
          <div class="form-group">
            <label class="switch">
              <input type="checkbox" id="msgAlert">
              <span class="slider"></span>
            </label>
            <span class="switch-label">Message Alerts</span>
          </div>
          <div class="form-group">
            <label class="switch">
              <input type="checkbox" id="ticketAlert">
              <span class="slider"></span>
            </label>
            <span class="switch-label">Ticket Alerts</span>
          </div>
          <div class="form-group">
            <label class="switch">
              <input type="checkbox" id="soundAlert">
              <span class="slider"></span>
            </label>
            <span class="switch-label">Sound</span>
          </div>
          <button onclick="saveSettings()">Save Changes</button>
        </div>

        <!-- CHAT -->
        <div id="chat" class="settings-section">
          <h2>Chat Settings</h2>
          <input type="text" id="autoReply" placeholder="Auto Reply">
          <select id="chatEnabled">
            <option value="on">On</option>
            <option value="off">Off</option>
          </select>
          <button onclick="saveSettings()">Save Changes</button>
        </div>

        <!-- TICKETS -->
        <div id="tickets" class="settings-section">
          <h2>Ticket Settings</h2>
          <select id="priority">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
          </select>
          <select id="autoAssign">
            <option value="on">On</option>
            <option value="off">Off</option>
          </select>
          <button onclick="saveSettings()">Save Changes</button>
        </div>

        <!-- APPEARANCE -->
        <div id="appearance" class="settings-section">
          <h2>Appearance</h2>
          <select id="theme">
            <option>Light</option>
            <option>Dark</option>
          </select>
          <button onclick="saveSettings()">Save Changes</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // Switch sections
  function showSection(id) {
    document.querySelectorAll('.settings-section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // Apply theme with full color inversion
  function applyTheme(theme) {
    if (theme === 'Dark') {
      document.body.style.background = '#1e1e1e';
      document.body.style.color = '#ffffff';
      
      // Apply dark mode specific styles
      document.documentElement.style.colorScheme = 'dark';
      const style = document.createElement('style');
      style.id = 'dark-mode-theme';
      style.textContent = `
        body { background: #1e1e1e !important; color: #ffffff !important; }
        .main, .content, .topbar, .sidebar, .settings-container, .settings-sidebar, .settings-content { background: #1e1e1e !important; color: #ffffff !important; }
        input, textarea, select { background: #2d2d2d !important; color: #ffffff !important; border-color: #444 !important; }
        button { background: #0066cc !important; color: #ffffff !important; }
        a { color: #66b3ff !important; }
        h1, h2, h3, h4, h5, h6 { color: #ffffff !important; }
        label { color: #ffffff !important; }
      `;
      if (!document.getElementById('dark-mode-theme')) {
        document.head.appendChild(style);
      }
    } else {
      document.body.style.background = '#ffffff';
      document.body.style.color = '#000000';
      document.documentElement.style.colorScheme = 'light';
      
      const darkStyle = document.getElementById('dark-mode-theme');
      if (darkStyle) darkStyle.remove();
      
      // Remove invert filter
      const elements = document.querySelectorAll('*');
      elements.forEach(el => {
        if (el.style.filter === 'invert(1)') {
          el.style.filter = '';
        }
      });
    }
  }

  // Apply notification settings
  function applyNotificationSettings(settings) {
    // Store settings in localStorage for client-side effects
    localStorage.setItem('msgAlert', settings.msgAlert);
    localStorage.setItem('ticketAlert', settings.ticketAlert);
    localStorage.setItem('soundAlert', settings.soundAlert);

    // Request notification permission if any alert is enabled
    if (settings.msgAlert || settings.ticketAlert) {
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
      }
    }

    // Log the applied settings
    console.log('Notification settings applied:', settings);
  }

  // Load theme and user settings
  async function loadSettings() {
    // Theme from localStorage
    const savedTheme = localStorage.getItem('theme') || 'Light';
    applyTheme(savedTheme);
    const themeSelect = document.getElementById('theme');
    if (themeSelect) themeSelect.value = savedTheme;

    // Load from server
    try {
      const res = await fetch('/api/settings');
      const data = await res.json();

      document.getElementById('displayName').value = data.displayName || '';
      document.getElementById('email').value = data.email || '';
      document.getElementById('autoReply').value = data.autoReply || '';
      document.getElementById('chatEnabled').value = data.chatEnabled || 'on';
      document.getElementById('msgAlert').checked = data.msgAlert || false;
      document.getElementById('ticketAlert').checked = data.ticketAlert || false;
      document.getElementById('soundAlert').checked = data.soundAlert || false;
      document.getElementById('priority').value = data.priority || 'Low';
      document.getElementById('autoAssign').value = data.autoAssign || 'on';

      // Apply notification settings on load
      applyNotificationSettings({
        msgAlert: data.msgAlert || false,
        ticketAlert: data.ticketAlert || false,
        soundAlert: data.soundAlert || false
      });

    } catch (err) {
      console.error("Error loading settings:", err);
    }
  }

  // Save settings
  async function saveSettings() {
    const settings = {
      displayName: document.getElementById('displayName').value,
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
      autoReply: document.getElementById('autoReply').value,
      chatEnabled: document.getElementById('chatEnabled').value,
      msgAlert: document.getElementById('msgAlert').checked,
      ticketAlert: document.getElementById('ticketAlert').checked,
      soundAlert: document.getElementById('soundAlert').checked,
      priority: document.getElementById('priority').value,
      autoAssign: document.getElementById('autoAssign').value,
      theme: document.getElementById('theme').value
    };

    // Save theme to localStorage
    localStorage.setItem('theme', settings.theme);
    applyTheme(settings.theme);

    try {
      await fetch('/api/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(settings)
      });

      // Apply notification settings effects
      applyNotificationSettings(settings);

      const msg = document.getElementById('successMsg');
      msg.style.display = 'block';
      setTimeout(() => { msg.style.display = 'none'; }, 3000);
    } catch (err) {
      console.error("Error saving settings:", err);
    }
  }

  // Highlight sidebar
  const sidebarLinks = document.querySelectorAll('.sidebar .menu a');
  const currentPath = window.location.pathname.split("/").pop();
  sidebarLinks.forEach(link => {
    link.classList.remove('active');
    if (link.getAttribute('href') === currentPath || (currentPath === '' && link.getAttribute('href') === 'dashboard.html')) {
      link.classList.add('active');
    }
  });

  // Load staff name and account settings
  fetch("/api/user")
    .then(res => res.json())
    .then(data => {
      // show the user-friendly display name from settings, fallback to role or name
      const name = data.displayName || data.name || data.role || 'Staff';
      document.getElementById("staffName").textContent = name;
    })
    .catch(err => console.log("User fetch error", err));

  // Populate settings on page load
  window.addEventListener('DOMContentLoaded', loadSettings);

  // Initialize
  loadSettings();
</script>

</body>
</html>
