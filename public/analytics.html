      // Apply theme from localStorage immediately to prevent flash
      (function applyThemeImmediately() {
        const theme = localStorage.getItem('theme') || 'Light';
        if (theme === 'Dark') {
          const style = document.createElement('style');
          style.id = 'dark-mode-theme';
          style.textContent = `
            body { background: #1e1e1e !important; color: #ffffff !important; }
            input, textarea, select { background: #2d2d2d !important; color: #ffffff !important; border-color: #444 !important; }

            h1, h2, h3, h4, h5, h6 { color: #ffffff !important; }
            h3 {color: #ffffff !important; }
            label, span { color: #ffffff !important; }
          `;
          document.head.appendChild(style);
        }
      })();

<script>
// Highlight the active sidebar link
const sidebarLinks = document.querySelectorAll('.sidebar .menu a');
const currentPath = window.location.pathname;
sidebarLinks.forEach(link => {
    // Remove any existing active class
    link.classList.remove('active');
    // Compare href with current path
    if (link.getAttribute('href') === currentPath.split("/").pop() || 
        (link.getAttribute('href') === "#" && currentPath.endsWith("dashboard.html"))) {
        link.classList.add('active');
    }
});
</script>
<script>
// Load staff name (same as tickets page)
fetch("/api/user")
  .then(res => {
    if (res.status === 401) {
      window.location.href = "/login.html";
      return;
    }
    return res.json();
  })
  .then(data => {
    if (data) document.getElementById("staffName").textContent = data.role;
  })
  .catch(err => console.log("User fetch error", err));
</script>
