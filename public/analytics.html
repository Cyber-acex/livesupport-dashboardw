<script>
// Highlight the active sidebar link
const sidebarLinks = document.querySelectorAll('.sidebar .menu a');
const currentPath = window.location.pathname;
sidebarLinks.forEach(link => {
    // Remove any existing active class
    link.classList.remove('active');
    // Compare href with current path
    if (link.getAttribute('href') === currentPath.split("/").pop() || 
        (link.getAttribute('href') === "#" && currentPath.endsWith("dashboard.html"))) {
        link.classList.add('active');
    }
});
</script>
<script>
// Load staff name (same as tickets page)
fetch("/api/user")
  .then(res => {
    if (res.status === 401) {
      window.location.href = "/login.html";
      return;
    }
    return res.json();
  })
  .then(data => {
    if (data) document.getElementById("staffName").textContent = data.role;
  })
  .catch(err => console.log("User fetch error", err));
</script>

<style>
    /* Space background styling */
    body {
        background: radial-gradient(circle at 20% 50%, transparent 0%, rgba(200, 200, 200, 0.3) 50%),
                    radial-gradient(circle at 80% 80%, rgba(220, 220, 220, 0.2) 0%, transparent 50%),
                    linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 50%, #f0f0f0 100%);
        background-attachment: fixed;
        position: relative;
        overflow-x: hidden;
    }
    
    /* Text visibility fixes for light space background */
    .sidebar, .sidebar h2, .sidebar a {
        color: #a41010 !important;
    }
    .topbar, .topbar span, .topbar strong {
        color: #2c2c2c !important;
    }
    .chart-item h3 {
        color: #1a1a1a !important;
        text-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        font-weight: bold;
    }
    .main {
        color: #2c2c2c;
    }
    .chart-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin: 40px 20px; /* Added more margin to bring charts down */
    }
    .chart-grid .chart-item {
        text-align: center;
    }
    .chart-row {
        display: flex;
        justify-content: space-between;
        margin: 40px 0; /* Added more margin to bring charts down */
    }
    .chart-row .chart-item {
        flex: 1;
        margin: 0 10px;
    }
    .chart-container {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        height: 80vh; /* Center the chart vertically */
        margin-top: 750px; /* Push the chart further down */
        margin-right: 400px;
        position: relative;
        z-index: 10;
    }
    .chart-container.chart-left {
        margin-left: 0;
        margin-right: 300px;
    }
    .message-chart-container {
        position: fixed;
        bottom: 20px;
        left: 300px;     
        width: 420px;
        z-index: 1000;
    }
    .message-chart-container .chart-item {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 18px;
        padding: 16px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
    }
    canvas {
        max-width: 400px; /* Adjusted size for better presentation */
        max-height: 400px; /* Adjusted size for better presentation */
    }
</style>
