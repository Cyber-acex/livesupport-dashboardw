<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveSupport - Orders</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/timestamp.css">
  <script>
    // Apply theme from localStorage immediately to prevent flash
    (function applyThemeImmediately() {
      const theme = localStorage.getItem('theme') || 'Light';
      if (theme === 'Dark') {
        document.documentElement.classList.add('dark-theme');
      } else {
        document.documentElement.classList.remove('dark-theme');
      }
    })();
  </script>
  <style>
    .orders-container {
      padding: 20px;
    }
    
    .orders-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }
    
    .orders-header h1 {
      font-size: 28px;
      margin: 0;
    }
    
    .orders-filters {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .filter-input {
      padding: 10px 15px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
    
    .filter-btn {
      padding: 10px 15px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }
    
    .filter-btn:hover {
      background: #0056b3;
    }
    
    .orders-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    
    .orders-table thead {
      background: #f8f9fa;
      border-bottom: 2px solid #dee2e6;
    }
    
    .orders-table th {
      padding: 15px;
      text-align: left;
      font-weight: 600;
      color: #333;
    }
    
    .orders-table td {
      padding: 15px;
      border-bottom: 1px solid #dee2e6;
    }
    
    .orders-table tbody tr:hover {
      background: #f5f5f5;
    }
    
    .order-id {
      font-weight: 600;
      color: #007bff;
      cursor: pointer;
      white-space: nowrap;
    }
    
    .order-id:hover {
      text-decoration: underline;
    }
    .order-id-cell {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .copy-order-btn {
      background: transparent;
      border: none;
      color: #007bff;
      font-size: 13px;
      padding: 2px 4px;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0.7;
      position: relative;
      transition: background 0.2s, opacity 0.2s;
    }
    .copy-order-btn:hover {
      opacity: 1;
      background: rgba(0, 123, 255, 0.1);
    }
    .copy-order-btn::after {
      content: 'copy';
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      font-size: 10px;
      padding: 3px 6px;
      border-radius: 3px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }
    .copy-order-btn:hover::after {
      opacity: 1;
    }
    
    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      min-width: 80px;
    }
    
    .status-pending {
      background: #fff3cd;
      color: #856404;
    }
    
    .status-processing {
      background: #cfe2ff;
      color: #084298;
    }
    
    .status-completed {
      background: #d1e7dd;
      color: #0f5132;
    }
    
    .status-cancelled {
      background: #f8d7da;
      color: #842029;
    }
    
    .order-actions {
      display: flex;
      gap: 8px;
    }
    
    .action-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    
    .view-btn {
      background: #007bff;
      color: white;
    }
    
    .view-btn:hover {
      background: #0056b3;
    }
    
    .edit-btn {
      background: #28a745;
      color: white;
    }
    
    .edit-btn:hover {
      background: #218838;
    }
    
    .cancel-btn {
      background: #dc3545;
      color: white;
    }
    
    .cancel-btn:hover {
      background: #c82333;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }
    
    .empty-state svg {
      width: 64px;
      height: 64px;
      margin-bottom: 20px;
      opacity: 0.5;
    }
    
    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
      padding: 20px 0;
    }
    
    .pagination button {
      padding: 8px 12px;
      border: 1px solid #ddd;
      background: white;
      cursor: pointer;
      border-radius: 4px;
    }
    
    .pagination button.active {
      background: #007bff;
      color: white;
      border-color: #007bff;
    }
    
    .pagination button:hover:not(.active) {
      background: #f0f0f0;
    }
    /* Dark theme overrides */
    .dark-theme .filter-input {
      background: #2d2d2d;
      border-color: #444;
      color: #fff;
    }
    .dark-theme .orders-table {
      background: #1e1e1e;
    }
    .dark-theme .orders-table thead {
      background: #2d2d2d;
      border-bottom-color: #444;
    }
    .dark-theme .orders-table th {
      color: #fff;
    }
    .dark-theme .orders-table td {
      border-bottom-color: #444;
    }
    .dark-theme .orders-table tbody tr:hover {
      background: #2d2d2d;
    }
    .dark-theme .pagination button {
      background: #2d2d2d;
      border-color: #444;
      color: #fff;
    }
    .dark-theme .pagination button:hover:not(.active) {
      background: #3d3d3d;
    }
  </style>
</head>
<body>
<div class="dashboard">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2 class="logo">LiveSupport</h2>
    <nav class="menu">
      <a href="./dashboard.html"><svg class="nav-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19 3H5c-1.1 0-2 .9-2 2v14l4-4h12c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg><span class="nav-label">Inbox</span></a>
                <a href="./tickets.html"><svg class="nav-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20 7V4H4v3H2v10h18V7h-0zM6 6h12v2H6V6zm12 10H6v-6h12v6z"/></svg><span class="nav-label">Tickets</span></a>
                <a href="./staff-performance.html" class=""><svg class="nav-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M5 9h3v11H5zM10 4h3v16h-3zM15 13h3v7h-3z"/></svg><span class="nav-label">Staff Performance</span></a>
                <a href="./analytics.html"><svg class="nav-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M3 17h2V9H3v8zm4 0h2V3H7v14zm4 0h2v-6h-2v6zm4 0h2v-9h-2v9z"/></svg><span class="nav-label">Analytics</span></a>
                <a href="./knowledge.html"><svg class="nav-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 7v6c0 5 4 9 10 9s10-4 10-9V7l-10-5zM12 4.4L18.6 8 12 11.6 5.4 8 12 4.4z"/></svg><span class="nav-label">Knowledge Base</span></a>
                <a href="./orders.html" class="active"><svg  viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2zM7.16 14l.84-2h7.45l1.24 3H7.16zM7.6 6h10.8l-1.2 3H8.8L7.6 6z"/></svg><span class="nav-label">Orders</span></a>
                <a href="./tracking.html"><svg class="nav-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 8a4 4 0 100 8 4 4 0 000-8zm0-6c-6.6 0-12 5.4-12 12 0 3.6 1.6 6.8 4.2 9l.8-2.6C4.1 19.1 3 16.6 3 14 3 8.5 7.6 4 13 4s10 4.5 10 10c0 2.6-1.1 5.1-2.9 6.4L21 23c2.6-2.2 4-5.4 4-9 0-6.6-5.4-12-12-12z"/></svg><span class="nav-label">Tracking</span></a>
                <a href="./instagram.html"><svg class="nav-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M7 2h10a5 5 0 015 5v10a5 5 0 01-5 5H7a5 5 0 01-5-5V7a5 5 0 015-5zm5 6a5 5 0 100 10 5 5 0 000-10zm4-3a1 1 0 110 2 1 1 0 010-2z"/></svg><span class="nav-label">Instagram</span></a>
                <a href="./settings.html"><svg class="nav-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19.14 12.94a7.89 7.89 0 000-1.88l2.03-1.58-2-3.46-2.39.96a8.1 8.1 0 00-1.6-.93l-.36-2.5h-4l-.36 2.5c-.57.24-1.1.55-1.6.93L6.8 6.02l-2 3.46L6.83 11a7.89 7.89 0 000 1.88l-2.03 1.58 2 3.46 2.39-.96c.5.38 1.03.69 1.6.93l.36 2.5h4l.36-2.5c.57-.24 1.1-.55 1.6-.93l2.39.96 2-3.46-2.03-1.58zM12 15.5A3.5 3.5 0 1112 8.5a3.5 3.5 0 010 7z"/></svg><span class="nav-label">Settings</span></a>
    </nav>
  </aside>
  <!-- MAIN AREA -->
  <div class="main">
    <!-- TOPBAR -->
    <header class="topbar">
      <div class="branch">
        Branch: <strong>Ikeja Branch</strong>
      </div>
      <div class="top-right">
        <span>Staff: <span id="staffName">Loading...</span></span>
        <a href="/logout">
          <button class="logout-btn">Logout</button>
        </a>
      </div>
    </header>
    <!-- NOTIFICATION BAR -->
    <div id="notificationBar" class="notification-bar" style="display: none; background: #ff6b6b; color: white; padding: 10px; text-align: center; position: relative; z-index: 1000;">
      <span id="notificationText">Notification</span>
    </div>
    <!-- ORDERS SECTION -->
    <div class="orders-container">
      <div class="orders-header">
        <h1>Orders</h1>
        <button class="filter-btn" onclick="openNewOrderModal()">+ New Order</button>
      </div>
      <!-- FILTERS -->
      <div class="orders-filters">
        <input type="text" class="filter-input" id="searchInput" placeholder="Search by Order ID or Customer...">
        <select class="filter-input" id="statusFilter">
          <option value="">All Status</option>
          <option value="pending">Pending</option>
          <option value="processing">Processing</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <select class="filter-input" id="dateFilter">
          <option value="">All Dates</option>
          <option value="today">Today</option>
          <option value="week">This Week</option>
          <option value="month">This Month</option>
        </select>
        <button class="filter-btn" onclick="applyFilters()">Filter</button>
        <button class="filter-btn" style="background: #6c757d;" onclick="clearFilters()">Clear</button>
      </div>
      <!-- ORDERS TABLE -->
      <table class="orders-table">
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Customer Name</th>
            <th>Product</th>
            <th>Total Price</th>
            <th>Status</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="ordersTableBody">
          <!-- Orders will be loaded here -->
        </tbody>
      </table>
      <!-- EMPTY STATE -->
      <div id="emptyState" class="empty-state" style="display: none;">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
        </svg>
        <p>No orders found. Create one to get started!</p>
      </div>
      <!-- PAGINATION -->
      <div class="pagination" id="pagination"></div>
    </div>
  </div>
</div>
<!-- NEW ORDER MODAL -->
<div id="orderModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 2000; align-items: center; justify-content: center;">
  <div style="background: white; padding: 30px; border-radius: 8px; width: 90%; max-width: 500px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);">
    <h2 style="margin-top: 0;">Create New Order</h2>
    <form id="orderForm" onsubmit="handleCreateOrder(event)">
      <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px; font-weight: 600;">Customer Name</label>
        <input type="text" id="customerName" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
      </div>
      <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px; font-weight: 600;">Product</label>
        <input type="text" id="product" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
      </div>
      <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px; font-weight: 600;">Price</label>
        <input type="number" id="amount" step="0.01" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
      </div>
      <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px; font-weight: 600;">Status</label>
        <select id="orderStatus" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
          <option value="pending">Pending</option>
          <option value="processing">Processing</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      <div style="display: flex; gap: 10px;">
        <button type="submit" style="flex: 1; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600;">Create Order</button>
        <button type="button" onclick="closeOrderModal()" style="flex: 1; padding: 10px; background: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600;">Cancel</button>
      </div>
    </form>
  </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script src="./js/orders.js"></script>
</body>
</html>
